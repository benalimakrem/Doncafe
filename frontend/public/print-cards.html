<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Don Café — QR Table Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e0d4;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Jost', sans-serif;
    padding: 40px 20px;
  }

  .controls {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all .2s;
  }
  .btn-print { background: #2E1B0E; color: #F7F1E8; }
  .btn-print:hover { background: #4A2C1A; }
  .btn-dl { background: #B8872A; color: #fff; }
  .btn-dl:hover { background: #C9A97A; }

  /* Card container — 3 per row for A4 */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 90mm);
    gap: 8mm;
    max-width: 300mm;
  }

  .card {
    width: 90mm;
    background: #F7F1E8;
    border-radius: 5mm;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(46,27,14,.25);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card-top {
    width: 100%;
    background: #2E1B0E;
    padding: 6mm 5mm 4mm;
    text-align: center;
  }

  .card-logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22pt;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #C9A97A;
    line-height: 1;
  }

  .card-logo-sub {
    font-size: 6pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(201,169,122,.6);
    margin-top: 2mm;
    font-weight: 400;
  }

  .card-divider {
    width: 100%;
    height: 2mm;
    background: linear-gradient(to right, #C9A97A, #B8872A, #C9A97A);
  }

  .card-body {
    padding: 4mm 5mm 3mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3mm;
    flex: 1;
  }

  .qr-frame {
    background: #fff;
    border-radius: 3mm;
    padding: 3mm;
    border: 0.5px solid rgba(74,44,26,.2);
    width: 52mm;
    height: 52mm;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-frame svg, .qr-frame img {
    width: 46mm;
    height: 46mm;
    display: block;
  }

  .scan-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10pt;
    color: #7A4A2A;
    text-align: center;
    line-height: 1.4;
  }

  .scan-sub {
    font-size: 7pt;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #B8872A;
    text-align: center;
    font-style: normal;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
  }

  .card-bottom {
    width: 100%;
    background: #EDE4D3;
    padding: 3mm 5mm;
    text-align: center;
    border-top: 1px solid rgba(74,44,26,.12);
  }

  .wifi-text {
    font-size: 6.5pt;
    color: #7A4A2A;
    letter-spacing: 0.05em;
  }

  .url-text {
    font-size: 6pt;
    color: #B8872A;
    margin-top: 1mm;
    font-family: monospace;
    letter-spacing: 0.05em;
  }

  /* Ornament dots */
  .ornament {
    display: flex;
    align-items: center;
    gap: 2mm;
    margin: 1mm 0;
  }
  .ornament-line { flex: 1; height: 0.3mm; background: rgba(201,169,122,.4); }
  .ornament-dot { width: 1.5mm; height: 1.5mm; border-radius: 50%; background: rgba(201,169,122,.6); flex-shrink: 0; }

  @media print {
    body { background: white; padding: 10mm; }
    .controls { display: none; }
    .cards-grid { gap: 5mm; }
    .card { box-shadow: none; border: 0.5px solid #ccc; }
    @page { margin: 10mm; }
  }
</style>
</head>
<body>

<div class="controls">
  <button class="btn btn-dl" onclick="downloadCards()">⬇ Download SVG</button>
  <button class="btn btn-print" onclick="window.print()">🖨 Print Cards</button>
</div>

<div class="cards-grid" id="cards-grid">
  <!-- Cards injected by JS -->
</div>

<script>
async function loadQR() {
  try {
    const r = await fetch('/api/qr');
    const svgText = await r.text();
    const url = window.location.origin + '/';

    // Generate 6 cards (2 rows x 3 cols — fills one A4 sheet)
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div class="card-logo-title">Don Café</div>
          <div class="card-logo-sub">Tunis · Since 2015</div>
        </div>
        <div class="card-divider"></div>
        <div class="card-body">
          <div class="qr-frame">${svgText}</div>
          <div class="ornament">
            <div class="ornament-line"></div>
            <div class="ornament-dot"></div><div class="ornament-dot"></div><div class="ornament-dot"></div>
            <div class="ornament-line"></div>
          </div>
          <div class="scan-text">Scannez pour voir le menu complet</div>
          <div class="scan-sub">Scan to view menu</div>
        </div>
        <div class="card-bottom">
          <div class="wifi-text">Notre menu est en ligne</div>
          <div class="url-text">${url}</div>
        </div>
      `;
      // Fix SVG dimensions in the QR frame
      const svg = card.querySelector('.qr-frame svg');
      if (svg) {
        svg.style.width = '46mm';
        svg.style.height = '46mm';
      }
      grid.appendChild(card);
    }
  } catch(e) {
    document.getElementById('cards-grid').innerHTML =
      '<p style="color:#c00;padding:20px">Error loading QR code. Make sure the server is running.</p>';
  }
}

function downloadCards() {
  const grid = document.getElementById('cards-grid');
  const svgContent = grid.innerHTML;
  const blob = new Blob([`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">${svgContent}</svg>`], {type:'image/svg+xml'});
  // Better: download the full HTML
  const html = document.documentElement.outerHTML;
  const b2 = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b2);
  a.download = 'doncafe-table-cards.html';
  a.click();
}

loadQR();
</script>
</body>
</html>
